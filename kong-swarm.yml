# =====================================================
# KONG API GATEWAY - Configuração para Bingo System
# =====================================================
# Este arquivo deve ser criado como Docker Config no Swarm
# 
# No Portainer, vá em Configs e crie uma nova config:
# Nome: bingo_kong_config
# Conteúdo: (cole o conteúdo deste arquivo)
# =====================================================

_format_version: "2.1"
_transform: true

###
### Consumers / Users
###
consumers:
  - username: DASHBOARD

###
### Access Control List
###
acls:
  - consumer: DASHBOARD
    group: admin

###
### API Keys
###
keyauth_credentials:
  - consumer: DASHBOARD
    key: ${SUPABASE_SERVICE_KEY}

###
### Plugins
###
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - apikey
        - X-Client-Info
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

###
### Services and Routes
###
services:
  ## Auth Service
  - name: auth-v1
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open
    url: http://auth:9999
    routes:
      - name: auth-v1-open-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  ## REST Service (PostgREST)
  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_in_header: true
          key_names:
            - apikey
            - Authorization

  ## Realtime Service
  - name: realtime-v1
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1-route
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors

  - name: realtime-v1-ws
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1-ws-route
        strip_path: true
        paths:
          - /realtime/v1/websocket
    plugins:
      - name: cors

  ## Storage Service
  - name: storage-v1
    url: http://storage:5000
    routes:
      - name: storage-v1-route
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors

  ## Meta Service (pg-meta)
  - name: meta
    url: http://meta:8080
    routes:
      - name: meta-route
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
          key_in_header: true
          key_names:
            - apikey
