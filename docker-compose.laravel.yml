version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: bingo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-bingo_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bingo}
      MYSQL_USER: ${MYSQL_USER:-bingo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bingo_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bingo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel API Backend
  api:
    build: ./laravel-api
    container_name: bingo-laravel-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:80"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-bingo}
      - DB_USERNAME=${MYSQL_USER:-bingo_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-bingo_password}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bingo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend (React/Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.selfhosted
    container_name: bingo-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - VITE_API_BASE_URL=http://api:80
    depends_on:
      - api
    networks:
      - bingo-network

volumes:
  mysql_data:
    driver: local

networks:
  bingo-network:
    driver: bridge
