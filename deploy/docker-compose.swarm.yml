version: "3.7"

# =====================================================
# BINGO SYSTEM - Docker Swarm Stack
# =====================================================
# OPÇÃO 1: Imagem combinada (app + backend integrado)
# OPÇÃO 2: Frontend e Backend separados (recomendado)
# =====================================================

services:
  # =====================================================
  # OPÇÃO 1: Imagem Combinada (Legado)
  # =====================================================
  # Descomente esta seção se estiver usando a imagem combinada
  # que inclui frontend e backend juntos
  
  # app:
  #   image: josemaeldon/bingo-system:latest
  #   working_dir: /usr/share/nginx/html
  #   deploy:
  #     replicas: 1
  #     placement:
  #       constraints:
  #         - node.role == manager
  #     labels:
  #       - "traefik.enable=true"
  #       - "traefik.docker.network=luzianet"
  #       - "traefik.http.routers.bingo.rule=Host(`bingo.seudominio.com`)"
  #       - "traefik.http.routers.bingo.entrypoints=websecure"
  #       - "traefik.http.routers.bingo.tls=true"
  #       - "traefik.http.routers.bingo.tls.certresolver=letsencryptresolver"
  #       - "traefik.http.middlewares.bingo-redirect.redirectscheme.scheme=https"
  #       - "traefik.http.routers.bingo.middlewares=bingo-redirect"
  #       - "traefik.http.routers.bingo.service=bingo-service"
  #       - "traefik.http.services.bingo-service.loadbalancer.server.port=80"
  #     update_config:
  #       parallelism: 1
  #       delay: 10s
  #       failure_action: rollback
  #     restart_policy:
  #       condition: on-failure
  #       delay: 5s
  #       max_attempts: 3
  #     resources:
  #       limits:
  #         memory: 128M
  #       reservations:
  #         memory: 64M
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s
  #   networks:
  #     - luzianet

  # =====================================================
  # OPÇÃO 2: Frontend e Backend Separados (Recomendado)
  # =====================================================
  # Use esta configuração para conectar a um PostgreSQL externo
  
  ## --------------------------- BINGO APP (Frontend) --------------------------- ##
  bingo_app:
    image: josemaeldon/bingo-system:app-main # ou app-latest
    environment:
      # URL da API - deve apontar para o backend
      - VITE_API_BASE_URL=https://api.bingo.santaluzia.org
      # Autenticação básica (opcional)
      - VITE_BASIC_AUTH_USER=
      - VITE_BASIC_AUTH_PASS=
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=luzianet"
        - "traefik.http.routers.bingo_app.rule=Host(`bingo.santaluzia.org`)"
        - "traefik.http.routers.bingo_app.entrypoints=websecure"
        - "traefik.http.routers.bingo_app.tls=true"
        - "traefik.http.routers.bingo_app.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.bingo_app.priority=1"
        - "traefik.http.services.bingo_app.loadbalancer.server.port=80"
    networks:
      - luzianet

  ## --------------------------- BINGO BACKEND (Node.js API) --------------------------- ##
  bingo_backend:
    image: josemaeldon/bingo-system:backend-main # ou backend-latest
    environment:
      # ============================================
      # CONFIGURAÇÃO DO BANCO DE DADOS POSTGRESQL
      # ============================================
      # IMPORTANTE: Configure estes valores com as credenciais
      # do seu PostgreSQL que está em outra stack
      
      # Tipo do banco de dados
      - DB_TYPE=postgres
      
      # Host do PostgreSQL (nome do serviço ou IP)
      # Se o PostgreSQL está em outra stack na mesma rede,
      # use o nome do serviço (ex: postgres, supabase-db, etc)
      - DB_HOST=postgres
      
      # Porta do PostgreSQL (padrão: 5432)
      - DB_PORT=5432
      
      # Nome do banco de dados
      - DB_NAME=bingo
      
      # Usuário do PostgreSQL
      - DB_USER=postgres
      
      # Senha do PostgreSQL
      # ATENÇÃO: Substitua pela senha real do seu banco!
      # NÃO USE ESTA SENHA EM PRODUÇÃO!
      - DB_PASSWORD=CHANGE_THIS_PASSWORD
      
      # ============================================
      # CONFIGURAÇÕES OPCIONAIS
      # ============================================
      
      # Porta do servidor backend (padrão: 3001)
      - PORT=3001
      
      # Secret para geração de tokens JWT
      # Recomendado: Gerar um novo em https://generate-secret.vercel.app/32
      - JWT_SECRET=bingo_jwt_secret_2024_secure_change_me
      
      # Autenticação básica HTTP (opcional)
      # Deixe vazio para desabilitar
      - BASIC_AUTH_USER=
      - BASIC_AUTH_PASS=
      
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=luzianet"
        - "traefik.http.routers.bingo_backend.rule=Host(`api.bingo.santaluzia.org`)"
        - "traefik.http.routers.bingo_backend.entrypoints=websecure"
        - "traefik.http.routers.bingo_backend.tls=true"
        - "traefik.http.routers.bingo_backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.bingo_backend.priority=1"
        - "traefik.http.services.bingo_backend.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - luzianet

networks:
  luzianet:
    external: true
