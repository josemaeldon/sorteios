# =====================================================
# BINGO SYSTEM - Selfhosted (PostgreSQL Only)
# Apenas PostgreSQL + Backend Node.js + Frontend
# =====================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bingo123}
      POSTGRES_DB: ${POSTGRES_DB:-bingo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bingo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API (Node.js)
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-bingo}
      DB_USER: ${POSTGRES_USER:-bingo}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bingo123}
      JWT_SECRET: ${JWT_SECRET:-bingo_jwt_secret_change_me}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Frontend (Nginx)
  app:
    build:
      context: ..
      dockerfile: Dockerfile.selfhosted
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      VITE_BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
