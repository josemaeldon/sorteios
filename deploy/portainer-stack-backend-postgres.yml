version: "3.8"

# =====================================================
# BINGO SYSTEM - Backend + Frontend com PostgreSQL Externo
# =====================================================
# Este arquivo é para uso quando você já tem um PostgreSQL
# rodando em outra stack na mesma rede Docker.
#
# IMPORTANTE: Configure as variáveis de ambiente abaixo
# com as credenciais do seu PostgreSQL.
# =====================================================

services:
  ## --------------------------- BINGO APP (Frontend) --------------------------- ##
  bingo_app:
    image: josemaeldon/bingo-system:app-main # ou app-latest
    environment:
      # URL da API - deve apontar para o backend
      - VITE_API_BASE_URL=https://api.bingo.santaluzia.org
      # Autenticação básica (opcional)
      - VITE_BASIC_AUTH_USER=
      - VITE_BASIC_AUTH_PASS=
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=luzianet"
        - "traefik.http.routers.bingo_app.rule=Host(`bingo.santaluzia.org`)"
        - "traefik.http.routers.bingo_app.entrypoints=websecure"
        - "traefik.http.routers.bingo_app.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.bingo_app.priority=1"
        - "traefik.http.services.bingo_app.loadbalancer.server.port=80"
    networks:
      - luzianet

  ## --------------------------- BINGO BACKEND (Node.js API) --------------------------- ##
  bingo_backend:
    image: josemaeldon/bingo-system:backend-main # ou backend-latest
    environment:
      # ============================================
      # CONFIGURAÇÃO DO BANCO DE DADOS POSTGRESQL
      # ============================================
      # IMPORTANTE: Configure estes valores com as credenciais
      # do seu PostgreSQL que está em outra stack
      
      # Tipo do banco de dados
      - DB_TYPE=postgres
      
      # Host do PostgreSQL (nome do serviço ou IP)
      # Se o PostgreSQL está em outra stack na mesma rede,
      # use o nome do serviço (ex: postgres, supabase-db, etc)
      - DB_HOST=postgres
      
      # Porta do PostgreSQL (padrão: 5432)
      - DB_PORT=5432
      
      # Nome do banco de dados
      - DB_NAME=bingo
      
      # Usuário do PostgreSQL
      - DB_USER=postgres
      
      # Senha do PostgreSQL
      # ATENÇÃO: Substitua pela senha real do seu banco!
      # NÃO USE ESTA SENHA EM PRODUÇÃO!
      - DB_PASSWORD=CHANGE_THIS_PASSWORD
      
      # ============================================
      # CONFIGURAÇÕES OPCIONAIS
      # ============================================
      
      # Porta do servidor backend (padrão: 3001)
      - PORT=3001
      
      # Secret para geração de tokens JWT
      # Recomendado: Gerar um novo em https://generate-secret.vercel.app/32
      - JWT_SECRET=bingo_jwt_secret_2024_secure_change_me
      
      # Autenticação básica HTTP (opcional)
      # Deixe vazio para desabilitar
      - BASIC_AUTH_USER=
      - BASIC_AUTH_PASS=
      
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=luzianet"
        - "traefik.http.routers.bingo_backend.rule=Host(`api.bingo.santaluzia.org`)"
        - "traefik.http.routers.bingo_backend.entrypoints=websecure"
        - "traefik.http.routers.bingo_backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.bingo_backend.priority=1"
        - "traefik.http.services.bingo_backend.loadbalancer.server.port=3001"
    networks:
      - luzianet

networks:
  luzianet:
    external: true
