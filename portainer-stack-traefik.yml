version: "3.7"

# =====================================================
# BINGO SYSTEM - PORTAINER STACK
# Traefik externo + PostgreSQL externo
# =====================================================

services:
  # ============================================
  # Supabase Auth (GoTrue)
  # ============================================
  auth:
    image: supabase/gotrue:v2.143.0
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: https://api.${DOMAIN}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}?search_path=auth
      GOTRUE_SITE_URL: https://${DOMAIN}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - bingo-internal

  # ============================================
  # Supabase REST API (PostgREST)
  # ============================================
  rest:
    image: postgrest/postgrest:v12.0.1
    environment:
      PGRST_DB_URI: postgres://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      PGRST_DB_SCHEMAS: public,storage,auth
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - bingo-internal

  # ============================================
  # Supabase Realtime
  # ============================================
  realtime:
    image: supabase/realtime:v2.28.32
    environment:
      PORT: 4000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      SECURE_CHANNELS: "true"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - bingo-internal

  # ============================================
  # Supabase Storage
  # ============================================
  storage:
    image: supabase/storage-api:v0.46.4
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - bingo_storage_data:/var/lib/storage
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - bingo-internal

  # ============================================
  # Kong API Gateway
  # ============================================
  kong:
    image: kong:2.8.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    configs:
      - source: kong_config
        target: /var/lib/kong/kong.yml
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=luzianet"
        - "traefik.http.routers.bingo-api.rule=Host(`api.${DOMAIN}`)"
        - "traefik.http.routers.bingo-api.entrypoints=websecure"
        - "traefik.http.routers.bingo-api.tls=true"
        - "traefik.http.routers.bingo-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.bingo-api-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.bingo-api.middlewares=bingo-api-redirect"
        - "traefik.http.routers.bingo-api.service=bingo-api-service"
        - "traefik.http.services.bingo-api-service.loadbalancer.server.port=8000"
    networks:
      - bingo-internal
      - luzianet

  # ============================================
  # Supabase Meta (pg-meta)
  # ============================================
  meta:
    image: supabase/postgres-meta:v0.80.0
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${DB_HOST}
      PG_META_DB_PORT: ${DB_PORT}
      PG_META_DB_NAME: ${DB_NAME}
      PG_META_DB_USER: ${DB_USER}
      PG_META_DB_PASSWORD: ${DB_PASS}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - bingo-internal

  # ============================================
  # Supabase Studio (Admin Dashboard)
  # ============================================
  studio:
    image: supabase/studio:20240101-8e4a094
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${DB_PASS}
      DEFAULT_ORGANIZATION_NAME: Bingo System
      DEFAULT_PROJECT_NAME: Bingo
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: https://api.${DOMAIN}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=luzianet"
        - "traefik.http.routers.bingo-studio.rule=Host(`studio.${DOMAIN}`)"
        - "traefik.http.routers.bingo-studio.entrypoints=websecure"
        - "traefik.http.routers.bingo-studio.tls=true"
        - "traefik.http.routers.bingo-studio.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.bingo-studio-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.bingo-studio.middlewares=bingo-studio-redirect"
        - "traefik.http.routers.bingo-studio.service=bingo-studio-service"
        - "traefik.http.services.bingo-studio-service.loadbalancer.server.port=3000"
    networks:
      - bingo-internal
      - luzianet

  # ============================================
  # Bingo Frontend Application
  # ============================================
  app:
    image: josemaeldon/bingo-system:selfhosted
    environment:
      VITE_SUPABASE_URL: https://api.${DOMAIN}
      VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
      VITE_SUPABASE_PROJECT_ID: local
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=luzianet"
        - "traefik.http.routers.bingo-app.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.bingo-app.entrypoints=websecure"
        - "traefik.http.routers.bingo-app.tls=true"
        - "traefik.http.routers.bingo-app.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.bingo-app-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.bingo-app.middlewares=bingo-app-redirect"
        - "traefik.http.routers.bingo-app.service=bingo-app-service"
        - "traefik.http.services.bingo-app-service.loadbalancer.server.port=80"
    networks:
      - bingo-internal
      - luzianet

# ============================================
# Configs (Kong inline)
# ============================================
configs:
  kong_config:
    content: |
      _format_version: "2.1"
      _transform: true

      consumers:
        - username: DASHBOARD
        - username: anon
          keyauth_credentials:
            - key: ${ANON_KEY}
        - username: service_role
          keyauth_credentials:
            - key: ${SERVICE_ROLE_KEY}

      acls:
        - consumer: anon
          group: anon
        - consumer: service_role
          group: admin

      services:
        - name: auth-v1-open
          url: http://auth:9999/verify
          routes:
            - name: auth-v1-open
              strip_path: true
              paths:
                - /auth/v1/verify
          plugins:
            - name: cors

        - name: auth-v1-open-callback
          url: http://auth:9999/callback
          routes:
            - name: auth-v1-open-callback
              strip_path: true
              paths:
                - /auth/v1/callback
          plugins:
            - name: cors

        - name: auth-v1-open-authorize
          url: http://auth:9999/authorize
          routes:
            - name: auth-v1-open-authorize
              strip_path: true
              paths:
                - /auth/v1/authorize
          plugins:
            - name: cors

        - name: auth-v1
          url: http://auth:9999
          routes:
            - name: auth-v1
              strip_path: true
              paths:
                - /auth/v1/
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon

        - name: rest-v1
          url: http://rest:3000
          routes:
            - name: rest-v1
              strip_path: true
              paths:
                - /rest/v1/
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon

        - name: realtime-v1
          url: http://realtime:4000/socket
          routes:
            - name: realtime-v1
              strip_path: true
              paths:
                - /realtime/v1/
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon

        - name: storage-v1
          url: http://storage:5000
          routes:
            - name: storage-v1
              strip_path: true
              paths:
                - /storage/v1/
          plugins:
            - name: cors
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin
                  - anon

        - name: meta
          url: http://meta:8080
          routes:
            - name: meta
              strip_path: true
              paths:
                - /pg/
          plugins:
            - name: key-auth
              config:
                hide_credentials: false
            - name: acl
              config:
                hide_groups_header: true
                allow:
                  - admin

# ============================================
# Volumes
# ============================================
volumes:
  bingo_storage_data:
    external: true

# ============================================
# Networks
# ============================================
networks:
  bingo-internal:
    driver: overlay
  luzianet:
    external: true
